
name: Atualizar Dashboard Vesti

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília (11:00 UTC)
  workflow_dispatch:      # Permite rodar manualmente com um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          pip install pandas numpy statsmodels scikit-learn

      - name: Rodar Pipeline
        run: python pipeline.py

      - name: Enviar mudanças de volta ao repositório
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add dados_dashboard.json
          
          # Verifica se há algo para commitar
          if git diff-index --quiet HEAD --; then
            echo "Nenhuma mudança para commitar."
          else
            git commit -m "Automação: Atualizando dados do dashboard"
            git push origin main
          fi