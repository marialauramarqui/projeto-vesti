
name: Atualizar Dashboard Vesti

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília (11:00 UTC)
  workflow_dispatch:      # Permite rodar manualmente com um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          pip install pandas numpy statsmodels scikit-learn

      - name: Rodar Pipeline
        run: python pipeline.py

      - name: Enviar mudanças de volta ao repositório
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listando arquivos na pasta:"
          ls -R
          
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Tenta adicionar o arquivo. Se ele estiver em outra pasta, o Git vai te dizer onde.
          git add dados_dashboard.json || echo "Arquivo dados_dashboard.json não encontrado na raiz!"
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automação: Atualizando dados do dashboard"
            git push origin HEAD:main
          else
            echo "Nenhuma mudança para commitar."
          fi