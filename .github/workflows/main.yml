name: Atualizar Dashboard Vesti

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília (11:00 UTC)
  workflow_dispatch:      # Permite rodar manualmente com um botão

permissions:
  contents: write

jobs:
  atualizar-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install pandas numpy statsmodels scikit-learn requests

      - name: Rodar Pipeline
        run: |
          python pipeline.py

          if [ -f "dados_dashboard.json" ]; then
            echo "SUCESSO: dados_dashboard.json gerado!"
          else
            echo "ERRO: dados_dashboard.json NAO foi criado."
            exit 1
          fi

      - name: Commit e Push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_dashboard.json data_powerbi/ dashboard_desafio.html
          if git diff --cached --quiet; then
            echo "Nenhuma alteracao nos dados, nada para commitar."
          else
            git commit -m "chore: atualizar dados do dashboard [automacao diaria]"
            git push
          fi
