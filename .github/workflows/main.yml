
name: Atualizar Dashboard Vesti

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília (11:00 UTC)
  workflow_dispatch:      # Permite rodar manualmente com um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          pip install pandas numpy statsmodels scikit-learn

      - name: Rodar Pipeline e Debugar
        run: |
          echo "--- Listando arquivos ANTES de rodar o pipeline ---"
          ls -la
          
          python pipeline.py
          
          echo "--- Listando arquivos DEPOIS de rodar o pipeline ---"
          ls -la
          
          echo "--- Verificando se o arquivo existe ---"
          if [ -f "dados_dashboard.json" ]; then
            echo "SUCESSO: Arquivo encontrado!"
          else
            echo "ERRO: O arquivo dados_dashboard.json NÃO foi criado pelo pipeline."
          fi